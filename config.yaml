# OpenClaw Backup Manager Configuration

backup:
  # Where to store backup archives
  output_dir: ~/Documents/Backups/openclaw/
  
  # Verify backup integrity after creation (uses openclaw backup verify)
  verify_after: true
  
  # Include workspace directories in backup
  include_workspace: true

retention:
  # Keep last N daily backups
  daily: 7
  
  # Keep 1 backup per week for past N weeks
  weekly: 4
  
  # Keep 1 backup per month (-1 = keep indefinitely)
  monthly: -1

storage:
  s3:
    enabled: false
    bucket: ""
    prefix: "openclaw-backups/"
    region: "us-east-1"
    # Credentials via standard AWS chain:
    # - Environment variables (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
    # - ~/.aws/credentials
    # - IAM role if running on EC2

options:
  # Dry run mode — show what would happen without making changes
  dry_run: false
  
  # Maintain a 'latest' symlink pointing to most recent backup
  keep_latest_symlink: true
